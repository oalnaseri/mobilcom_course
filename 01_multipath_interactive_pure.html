<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multipath Propagation — Interactive Explorer</title>
<style>
 body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background: #f0f4f8; }
 .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 16px; padding: 24px 28px; box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
 h1 { text-align: center; color: #2c3e50; margin-bottom: 6px; }
 h2 { text-align: center; color: #7f8c8d; margin-top: 0; margin-bottom: 18px; font-size: 1.05em; }
 #canvas { width: 100%; height: 520px; border: 1px solid #ccc; border-radius: 10px; background: #eaf2f8; }
 .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 14px; margin: 22px 0; }
 .control { background: #f8fafc; border-radius: 10px; padding: 10px 12px; border: 1px solid #e0e7ff; }
 .control label { display: block; font-size: 0.9em; margin-bottom: 4px; color: #34495e; }
 input[type=range], input[type=checkbox] { width: 100%; }
 .summary { margin-top: 10px; font-size: 0.9em; color: #34495e; background:#f5f7ff; padding:10px 12px; border-radius:8px; border-left:4px solid #4c6fff; }
 .summary b { color:#1f3bb3; }
 .checkbox-group { display: flex; align-items: center; gap: 8px; }
</style>
</head>
<body>
<div class="container">
<h1>Multipath Propagation</h1>
<h2>Interactive Friis Equation & Paths (Direct, Diffraction, Scattering, Reflection)</h2>
<canvas id="canvas"></canvas>

<div class="controls">
  <div class="control">
    <label>P_tx [dBm]: <span id="ptx-val">30</span></label>
    <input type="range" id="ptx" min="0" max="50" step="1" value="30">
    <label>G_Tx [dBi]: <span id="gtx-val">15</span></label>
    <input type="range" id="gtx" min="0" max="30" step="1" value="15">
    <label>G_Rx [dBi]: <span id="grx-val">0</span></label>
    <input type="range" id="grx" min="0" max="15" step="1" value="0">
  </div>
  <div class="control">
    <label>Frequency [MHz]: <span id="f-val">1800</span></label>
    <input type="range" id="freq" min="700" max="6000" step="100" value="1800">
    <label>Distance r [m]: <span id="r-val">500</span></label>
    <input type="range" id="dist" min="10" max="5000" step="10" value="500">
  </div>
  <div class="control">
    <label>Diffraction loss [dB]: <span id="diff-val">10</span></label>
    <input type="range" id="diff" min="0" max="30" step="1" value="10">
    <label>Scattering loss [dB]: <span id="scat-val">15</span></label>
    <input type="range" id="scat" min="0" max="30" step="1" value="15">
    <label>Reflection loss [dB]: <span id="refl-val">8</span></label>
    <input type="range" id="refl" min="0" max="30" step="1" value="8">
    <div class="checkbox-group">
      <input type="checkbox" id="animate" unchecked>
      <label for="animate" style="font-size:0.85em;">Animate arrows</label>
    </div>
  </div>
</div>

<div class="summary" id="summary-box"></div>

</div>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
canvas.width = 1200; canvas.height = 520;
const c0 = 3e8;
let animationTime = 0;

function friis(Ptx_dBm, Gtx_dBi, Grx_dBi, f_MHz, r_m) {
  const f = f_MHz * 1e6;
  const lambda = c0 / f;
  const FSPL_dB = 20*Math.log10(4*Math.PI*r_m/lambda);
  const Prx_dBm = Ptx_dBm + Gtx_dBi - FSPL_dB + Grx_dBi;
  return {Prx_dBm, FSPL_dB, lambda};
}

function multipathTotal(P_los_dBm, losses) {
  let P_lin = Math.pow(10, P_los_dBm/10);
  for (const L of losses) {
    P_lin += Math.pow(10, (P_los_dBm - L)/10);
  }
  return 10*Math.log10(P_lin);
}

function drawRealisticTower(x, y) {
  // Mast
  ctx.strokeStyle='#4a5568'; ctx.lineWidth=8; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(x,360); ctx.lineTo(x,y); ctx.stroke();

  // Cross arms (3 levels)
  ctx.lineWidth=6; for(let i=0; i<3; i++){
    const h = y + 20 + i*25;
    ctx.beginPath(); ctx.moveTo(x-20,h); ctx.lineTo(x+20,h); ctx.stroke();
  }

  // Antennas (parabolic dishes)
  ctx.strokeStyle='#3182ce'; ctx.lineWidth=3; for(let i=0; i<3; i++){
    const h = y + 25 + i*25;
    ctx.beginPath(); ctx.arc(x, h, 18, -0.3, Math.PI+0.3); ctx.stroke();
  }

  // Base
  ctx.fillStyle='#2d3748'; ctx.beginPath(); ctx.roundRect(x-25,360,50,8,4); ctx.fill();

  ctx.fillStyle='#2d3748'; ctx.font='bold 11px Segoe UI'; ctx.textAlign='center'; ctx.fillText('BS (Tx)', x, y-8);
}

function drawRealisticHouse(x, y) {
  // Main body
  const gradient = ctx.createLinearGradient(x-60,y,x+60,y+70);
  gradient.addColorStop(0,'#fbbf24'); gradient.addColorStop(1,'#f59e0b');
  ctx.fillStyle=gradient; ctx.strokeStyle='#b45309'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.roundRect(x-60,y,120,70,8); ctx.fill(); ctx.stroke();

  // Roof
  ctx.fillStyle='#dc2626'; ctx.strokeStyle='#b91c1c'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(x-65,y); ctx.lineTo(x-5,y-55); ctx.lineTo(x+65,y); ctx.closePath(); ctx.fill(); ctx.stroke();

  // Windows
  ctx.fillStyle='#60a5fa'; ctx.strokeStyle='#1e40af'; ctx.lineWidth=1.5;
  for(let wx of [x-35, x+10]){ ctx.beginPath(); ctx.roundRect(wx,y+15,25,25,4); ctx.fill(); ctx.stroke(); }

  // Door
  ctx.fillStyle='#f3f4f6'; ctx.strokeStyle='#4b5563'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(x-10,y+35,20,30,4); ctx.fill(); ctx.stroke();

  ctx.fillStyle='#b45309'; ctx.font='bold 10px Segoe UI'; ctx.textAlign='center'; ctx.fillText('House', x, y+85);
}

function drawRealisticBuilding(x, y) {
  // Main structure
  const gradient = ctx.createLinearGradient(x-45,y,x+45,y+150);
  gradient.addColorStop(0,'#d97706'); gradient.addColorStop(1,'#92400e');
  ctx.fillStyle=gradient; ctx.strokeStyle='#78350f'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.roundRect(x-45,y,90,150,6); ctx.fill(); ctx.stroke();

  // Windows (3x2 grid)
  ctx.fillStyle='#93c5fd'; ctx.strokeStyle='#1e40af'; ctx.lineWidth=1;
  for(let row=0; row<3; row++) for(let col=0; col<2; col++){
    const wx = x-38 + col*38; const wy = y+20 + row*42;
    ctx.beginPath(); ctx.roundRect(wx,wy,28,35,3); ctx.fill(); ctx.stroke();
  }

  // Antenna on roof
  ctx.fillStyle='#6b7280'; ctx.strokeStyle='#4b5563'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.rect(x-8,y-12,16,12); ctx.fill(); ctx.stroke();

  ctx.fillStyle='#92400e'; ctx.font='bold 10px Segoe UI'; ctx.textAlign='center'; ctx.fillText('Building', x, y+165);
}

function drawRealisticMobile(x, y) {
  // Car body
  const gradient = ctx.createLinearGradient(x-70,y-20,x+60,y+25);
  gradient.addColorStop(0,'#10b981'); gradient.addColorStop(1,'#059669');
  ctx.fillStyle=gradient; ctx.strokeStyle='#047857'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.roundRect(x-70,y-20,130,45,12); ctx.fill(); ctx.stroke();

  // Windows
  ctx.fillStyle='#e0f2fe'; ctx.strokeStyle='#0369a1'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.roundRect(x-45,y-8,35,25,6); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.roundRect(x-5,y-8,35,25,6); ctx.fill(); ctx.stroke();

  // Wheels
  ctx.fillStyle='#1f2937'; ctx.strokeStyle='#111827'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(x-45,y+22,12,0,2*Math.PI); ctx.fill(); ctx.stroke();
  ctx.beginPath(); ctx.arc(x+35,y+22,12,0,2*Math.PI); ctx.fill(); ctx.stroke();

  ctx.fillStyle='#047857'; ctx.font='bold 12px Segoe UI'; ctx.textAlign='center'; ctx.fillText('MS (Rx)', x, y-35);
}

function drawScene(Ptx,Gtx,Grx,fMHz,r,Ld,Ls,Lr){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const g = ctx.createLinearGradient(0,0,0,canvas.height);
  g.addColorStop(0,'#dbe9f7'); g.addColorStop(0.6,'#dbe9f7'); g.addColorStop(0.61,'#a8d5a2'); g.addColorStop(1,'#a8d5a2');
  ctx.fillStyle=g; ctx.fillRect(0,0,canvas.width,canvas.height);

  const TX={x:140,y:130}; const RX={x:860,y:320};
  ctx.strokeStyle='#6aab6a'; ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(0,360); ctx.lineTo(canvas.width,360); ctx.stroke();

  // ── REALISTIC DRAWINGS ──
  drawRealisticTower(TX.x, TX.y);
  drawRealisticHouse(540,235);
  drawRealisticTree(380,380);
  drawRealisticBuilding(1040,215);
  drawRealisticMobile(RX.x, RX.y);

  function drawRealisticTree(x, y) {
    // Trunk
    ctx.strokeStyle='#8b4513'; ctx.lineWidth=8; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x,360); ctx.lineTo(x,y+80); ctx.stroke();

    // Foliage (3 overlapping circles)
    ctx.fillStyle='#22c55e'; ctx.strokeStyle='#16a34a'; ctx.lineWidth=2;
    for(let i=0; i<1; i++){
      ctx.beginPath(); ctx.arc(x+i*15,y-25-i*8,45,0,2*Math.PI); ctx.fill(); ctx.stroke();
    }
  }

  function curve(x0,y0,x1,y1,color,bend,label,dx,dy){
    ctx.strokeStyle=color; ctx.lineWidth=4; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); const cx=(x0+x1)/2 + bend*80; const cy=(y0+y1)/2 - bend*40;
    ctx.moveTo(x0,y0); ctx.quadraticCurveTo(cx,cy,x1,y1); ctx.stroke();
    if(label){ctx.fillStyle='white'; ctx.strokeStyle=color; ctx.lineWidth=2; const lx=(x0+x1)/2+dx; const ly=(y0+y1)/2+dy; ctx.beginPath(); ctx.roundRect(lx-60,ly-16,120,24,8); ctx.fill(); ctx.stroke(); ctx.fillStyle=color; ctx.font='bold 12px Segoe UI'; ctx.textAlign='center'; ctx.fillText(label,lx,ly+5);} }

  // ── ANIMATED PATHS ──
  const anim = document.getElementById('animate').checked ? animationTime : 1;

  // Direct path (green)
  curve(TX.x,TX.y,RX.x,RX.y,'#10b981',-0.1,'Direct path (LOS)',-130,0);

  // Diffraction (blue via house)
  curve(TX.x,TX.y,540,200,'#3b82f6',-0.35,'',0,0);
  curve(540,200,RX.x,RX.y,'#3b82f6',-0.35,'Diffraction (house)',10,-10);

  // Scattering (red via tree)
  curve(TX.x,TX.y,380,355,'#ef4444',0.25,'',0,0);  // tree foliage
  curve(380,355,RX.x,RX.y,'#ef4444',-0.25,'Scattering (tree)',-50,35);

  // Reflection (dark via building)
  curve(TX.x,TX.y,1040-45,260,'#1f2937',-0.3,'',0,0);
  curve(1040-45,260,RX.x,RX.y,'#1f2937',0.4,'Reflection (building)',-30,-60);

  // ── ANIMATED ARROW ──
  if(document.getElementById('animate').checked){
    // Slower animation
    animationTime += 0.01;  // was 0.03
    if(animationTime > 4) animationTime = 0;

    const paths = [
      // Direct: BS → MS
      [{x:TX.x,y:TX.y}, {x:RX.x,y:RX.y}],
      // Diffraction: BS → house → MS
      [{x:TX.x,y:TX.y}, {x:540,y:200}, {x:RX.x,y:RX.y}],
      // Scattering: BS → tree → MS
      [{x:TX.x,y:TX.y}, {x:380,y:355}, {x:RX.x,y:RX.y}],
      // Reflection: BS → building edge → MS
      [{x:TX.x,y:TX.y}, {x:1040-45,y:260}, {x:RX.x,y:RX.y}]
    ];

    const pathIdx = Math.floor(animationTime);
    const phase = animationTime % 1;   // 0 → 1 per path
    const pts = paths[pathIdx];
    const nSeg = pts.length - 1;
    const segIdx = Math.min(Math.floor(phase * nSeg), nSeg-1);
    const localT = (phase * nSeg) - segIdx;  // 0..1 along current segment

    ctx.save();
    ctx.strokeStyle='#ffd700'; ctx.lineWidth=6; ctx.lineCap='round';
    ctx.shadowColor='#ffd700'; ctx.shadowBlur=15;

    // Draw segments already completed fully
    for(let i=0; i<segIdx; i++){
      const a = pts[i];
      const b = pts[i+1];
      ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    }

    // Current active segment
    const a = pts[segIdx];
    const b = pts[segIdx+1];
    const cx = a.x + (b.x-a.x)*localT;
    const cy = a.y + (b.y-a.y)*localT;
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(cx,cy); ctx.stroke();

    // Arrow head at (cx,cy)
    const angle = Math.atan2(b.y-a.y, b.x-a.x);
    ctx.beginPath(); ctx.moveTo(cx,cy);
    ctx.lineTo(cx+12*Math.cos(angle-Math.PI/6), cy+12*Math.sin(angle-Math.PI/6));
    ctx.lineTo(cx+12*Math.cos(angle+Math.PI/6), cy+12*Math.sin(angle+Math.PI/6));
    ctx.closePath(); ctx.fillStyle='#ffd700'; ctx.fill();

    ctx.restore();
    requestAnimationFrame(drawScene.bind(null,Ptx,Gtx,Grx,fMHz,r,Ld,Ls,Lr));
  }

  const res=friis(Ptx,Gtx,Grx,fMHz,r); const P_los=res.Prx_dBm; const P_tot=multipathTotal(P_los,[Ld,Ls,Lr]);
  const info=`P_tx=${Ptx.toFixed(0)} dBm | f=${fMHz.toFixed(0)} MHz | λ=${(res.lambda*100).toFixed(1)} cm | r=${r.toFixed(0)} m`;
  const info2=`FSPL=${res.FSPL_dB.toFixed(1)} dB | P_Rx(LOS)=${P_los.toFixed(1)} dBm | P_Rx(total)=${P_tot.toFixed(1)} dBm`;
  ctx.fillStyle='rgba(255,255,204,0.95)'; ctx.strokeStyle='#cccc00'; ctx.lineWidth=2; ctx.beginPath(); ctx.roundRect(360,20,480,50,10); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#2c3e50'; ctx.font='16px Segoe UI'; ctx.textAlign='center'; ctx.fillText(info,600,38); ctx.fillText(info2,600,56);

  document.getElementById('summary-box').innerHTML = `<b>Friis LOS:</b> P_Rx = ${P_los.toFixed(1)} dBm (FSPL ${res.FSPL_dB.toFixed(1)} dB)`+
  ` &nbsp; | &nbsp; <b>Multipath total:</b> ${P_tot.toFixed(1)} dBm`+
  `<br><b>Extra losses:</b> Diffraction ${Ld.toFixed(0)} dB, Scattering ${Ls.toFixed(0)} dB, Reflection ${Lr.toFixed(0)} dB`;
}

function getVal(id){return parseFloat(document.getElementById(id).value);} 

function update(){
  const Ptx=getVal('ptx'); const Gtx=getVal('gtx'); const Grx=getVal('grx');
  const f=getVal('freq'); const r=getVal('dist');
  const Ld=getVal('diff'); const Ls=getVal('scat'); const Lr=getVal('refl');
  document.getElementById('ptx-val').textContent=Ptx;
  document.getElementById('gtx-val').textContent=Gtx;
  document.getElementById('grx-val').textContent=Grx;
  document.getElementById('f-val').textContent=f;
  document.getElementById('r-val').textContent=r;
  document.getElementById('diff-val').textContent=Ld;
  document.getElementById('scat-val').textContent=Ls;
  document.getElementById('refl-val').textContent=Lr;
  drawScene(Ptx,Gtx,Grx,f,r,Ld,Ls,Lr);
}

['ptx','gtx','grx','freq','dist','diff','scat','refl','animate'].forEach(id=>{
  document.getElementById(id).addEventListener('input',update);
});
document.getElementById('animate').addEventListener('change', (e) => {
  if(!e.target.checked) animationTime = 0;
  update();
});

update();
</script>
</body></html>
